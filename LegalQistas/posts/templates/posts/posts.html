{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <h1 class="text-center mb-5">All Posts</h1>

    <div class="row">

        {% for post in posts %}

        <div class="col-md-4 mb-4">

            <div class="card shadow-sm h-100">

                {% if post.image %}
                    <img src="{{ post.image.url }}" class="card-img-top" style="height:250px; object-fit:cover;">
                {% else %}
                    <img src="https://placehold.co/400x250" class="card-img-top">
                {% endif %}

                <div class="card-body">

                    <h5>{{ post.title }}</h5>

                    <p class="text-muted small">
                        {{ post.created_at }}
                    </p>

                    <p>
                        {{ post.content|truncatewords:20 }}
                    </p>

                    {% if post.slug %}
                        <a href="{% url 'posts:post_detail_view' post.slug %}">
                            Read More
                        </a>
                    {% endif %}

                </div>
            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
